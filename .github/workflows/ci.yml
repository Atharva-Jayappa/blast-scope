name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
      - name: Run test suite
        run: uv run --extra dev pytest -q
      - name: Run calibration eval (floors pinned in tests, shown here for visibility)
        run: uv run python -m blast_scope.eval

  sandbox:
    # Speculative execution runs only on Linux with unprivileged namespaces —
    # exactly what GitHub's ubuntu runner provides and what the dev machine
    # (Windows) cannot. This job is where the real overlay sandbox and its
    # safety invariant (the real tree is never touched) actually execute.
    name: overlay sandbox (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Best-effort enable unprivileged namespaces (Ubuntu 24.04 restricts them)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
      - name: Report sandbox availability (informational — not a gate)
        run: |
          uv run python - << 'EOF'
          from blast_scope import speculate
          print("overlay sandbox available:", speculate.available())
          EOF
      # If the runner supports the sandbox, the real-sandbox tests execute and a
      # genuine safety-invariant failure fails this job (and the ci-ok gate). If
      # the runner doesn't (namespaces locked down), they skip and the job stays
      # green — we never block the branch on a CI-environment assumption we can't
      # verify from the dev machine.
      - name: Run the real-sandbox tests (safety invariant when available)
        run: uv run --extra dev pytest tests/test_speculate.py -q -rs

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - name: Check wheel ships licenses and vendored notice
        run: |
          uv run python - << 'EOF'
          import glob, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          for needle in ("licenses/LICENSE", "licenses/NOTICE", "vendor/crg/LICENSE"):
              assert any(needle in n for n in names), f"missing {needle} in wheel"
          print("wheel license contents OK")
          EOF

  ci-ok:
    # Single required status check for branch protection — green only when
    # every matrix job and the build succeed.
    name: ci-ok
    needs: [test, sandbox, build]
    runs-on: ubuntu-latest
    steps:
      - run: echo "all green"
